name: Tests

# Runs the Python suite in tests/ on every push and pull request.
#
# Until now nothing ran these tests automatically. The suite existed and passed
# locally, but a regression could only be caught by someone remembering to run
# pytest by hand. Guards that nothing enforces are decoration.
#
# The matrix floor is measured, not guessed: the suite was verified passing on
# 3.11 and 3.14 locally, so the interpreters in between are covered by the same
# range. Hooks run under whatever python3 a user happens to have, so version
# spread is a real portability signal for this project, not ceremony.
on:
  push:
  pull_request:
  workflow_dispatch:

# Least privilege: this job only reads the repo.
permissions:
  contents: read

# A newer push to the same ref makes the in-flight run irrelevant.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      # One red interpreter should not hide the result on the others.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      # The suite imports only the standard library plus the repo's own modules,
      # so pytest is the entire dependency footprint.
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      # Run from the repo root: the tests resolve the scripts under
      # skills/token-optimizer/scripts/ relative to it.
      - name: Run tests
        run: python -m pytest tests/ -q

  # Build the docs site here, not only in Deploy Docs.
  #
  # A single unescaped "<400" in an .mdx file broke the Astro build on 2026-07-22.
  # Deploy Docs went red on every run and the published site sat frozen at the
  # 2026-06-30 deploy for three weeks while documentation work kept landing on main.
  # It failed loudly in a workflow nobody was watching, which is the same as failing
  # quietly. Building here puts a broken page in front of the check that gates PRs,
  # so the break is caught before it reaches main instead of after it stops the world.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build docs site
        working-directory: docs-site
        run: npm run build
